<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - QBridge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <header>
        <div class="container">
            <nav>
                <div class="logo-container">
                    <img src="icon.png" class="logo-img" width="60" height="60">
                    <div class="logo-text">qBridge</div>
                </div>
                <button class="mobile-menu-btn">☰</button>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="programs.html">Programs</a></li>
                    <li><a href="curriculum.html">Curriculum</a></li>
                    <li><a href="faq.html">FAQ</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="register.html">Register</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Contact Page -->
    <section class="contact">
        <div class="container">
            <h2 class="section-title">Contact Us</h2>
            <form id="contact-form">
                <div class="form-group">
                    <label for="contact-name">Name</label>
                    <input type="text" id="contact-name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="contact-email">Email</label>
                    <input type="email" id="contact-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="contact-message">Message</label>
                    <textarea id="contact-message" name="message" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn">Send Message</button>
                <div id="contact-success" style="display:none; color: var(--secondary); margin-top: 1rem;">
                    Thank you for contacting us!
                </div>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <a href="index.html" class="logo">qBridge</a>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="programs.html">Programs</a>
                <a href="curriculum.html">Curriculum</a>
                <a href="faq.html">FAQ</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </footer>

    <script>
        // Contact form simulation
        document.getElementById('contact-form').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('contact-success').style.display = 'block';
            this.reset();
        });
    </script>
</body>
</html>
