<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QBridge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <header>
        <div class="container">
            <nav>
                <div class="logo-container">
                    <img src="icon.png" class="logo-img" width="60" height="60">
                    <div class="logo-text">qBridge</div>
                </div>
                <button class="mobile-menu-btn">☰</button>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="programs.html">Programs</a></li>
                    <li><a href="curriculum.html">Curriculum</a></li>
                    <li><a href="faq.html">FAQ</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="login.html" class="active">Login</a></li>
                    <li><a href="register.html">Register</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Login Page -->
    <section class="login">
        <div class="container">
            <h2 class="section-title">Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" required>
                </div>
                <button type="submit" class="btn">Login</button>
                <div id="login-success" style="display:none; color: var(--secondary); margin-top: 1rem;">
                    Login successful! (Simulated)
                </div>
                <div style="margin-top: 1rem;">
                    Don't have an account? <a href="register.html">Register</a>
                </div>
            </form>
        </div>
    </section>
    <!-- Footer -->
    <footer>
        <div class="container">
            <a href="index.html" class="logo">qBridge</a>
            <div class="footer-links">
                <a href="index.html">Home</a>
                <a href="programs.html">Programs</a>
                <a href="curriculum.html">Curriculum</a>
                <a href="faq.html">FAQ</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </footer>
    <script>
        // Login form simulation
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('login-success').style.display = 'block';
            this.reset();
        });
    </script>
</body>
</html>
